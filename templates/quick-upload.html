<section class="upload-card">
    <h2>Quick Upload</h2>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <div class="upload-grid">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" class="upload-field" required>
            </div>
            <div class="form-group">
                <label>Subject Code</label>
                <input type="text" name="subject_code" class="upload-field" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category" class="upload-field">
                    <option>Notes</option>
                    <option>Past Year</option>
                    <option>Tutorial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Choose File</label>
                <input type="file" name="resource_file" class="upload-field" required>
            </div>
            <button type="submit" class="btn-search">Upload</button>
        </div>
    </form>
</section>
