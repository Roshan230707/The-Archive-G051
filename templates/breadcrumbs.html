<style>
    /* Hidden Checkbox Controller */
    #sidebar-toggle {
        display: none;
    }

    /* Modernized Toggle Trigger Button */
    .menu-toggle-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }
    .menu-toggle-btn:hover {
        background: var(--primary-light);
        border-color: var(--primary);
    }
    .hamburger-icon {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 20px;
        height: 13px;
    }
    .hamburger-icon span {
        display: block;
        width: 100%;
        height: 2px;
        background-color: var(--primary);
        border-radius: 1px;
    }

    /* Sidebar Base Container Styles */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        background-color: var(--primary);
        color: #fdf6ec;
        z-index: 1001; /* Layer over other UI elements */
        padding: 24px;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 4px 0 15px rgba(0,0,0,0.1);
    }
    .sidebar-header h3 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.6rem;
        color: var(--accent);
        margin: 0;
    }
    .close-btn {
        background: none;
        border: none;
        color: #fdf6ec;
        font-size: 28px;
        cursor: pointer;
        opacity: 0.8;
    }
    .close-btn:hover { opacity: 1; }
    
    .sidebar-links {
        list-style: none;
        margin-top: 2rem;
        padding: 0;
    }
    .sidebar-links li {
        margin-bottom: 8px;
    }
    .sidebar-links a {
        color: #e8f0eb;
        text-decoration: none;
        font-size: 1rem;
        display: block;
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        font-family: 'DM Sans', sans-serif;
        transition: all 0.2s;
    }
    .sidebar-links a:hover {
        color: var(--text-main);
        background-color: var(--accent);
    }

    /* Dark Overlay Dimmer background */
    .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(28, 26, 22, 0.4);
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
    }

    #sidebar-toggle:checked ~ .sidebar {
        transform: translateX(0);
    }
    #sidebar-toggle:checked ~ .sidebar-overlay {
        opacity: 1;
        pointer-events: auto;
    }
</style>

<input type="checkbox" id="sidebar-toggle">

<nav class="sidebar">
    <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
        <h3>The Archive</h3>
        <label for="sidebar-toggle" class="close-btn">×</label>
    </div>
    <ul class="sidebar-links">
        <li><a href="/" onclick="document.getElementById('sidebar-toggle').checked = false;">All Resources 📚</a></li>
        <li><a href="#recent-resources" onclick="document.getElementById('sidebar-toggle').checked = false;">Recent Adds 🆕</a></li>
        <li><a href="/logout">Logout 👤</a></li>
    </ul>
</nav>

<label for="sidebar-toggle" class="sidebar-overlay"></label>
