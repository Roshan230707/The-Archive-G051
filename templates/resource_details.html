<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ resource.title }} - Discussion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="margin-bottom: 20px;"><a href="/" style="color: var(--primary); font-weight: 500; text-decoration: none;">← Back to Hub</a></div>

    <article class="upload-card" style="margin-bottom: 2rem;">
        <span class="badge">{{ resource.category }}</span>
        <h1 style="font-size: 2rem; margin-top: 10px;">{{ resource.title }}</h1>
        <p>Subject Code: <strong>{{ resource.subject_code }}</strong></p>
    </article>

    <section class="upload-card">
        <h2>Discussion Thread</h2>
        <form action="/resource/{{ resource.id }}/comment" method="POST" style="margin-bottom: 2rem;">
            <div class="form-group">
                <textarea name="comment_text" class="upload-field" rows="3" placeholder="Ask a question..." required></textarea>
            </div>
            <button type="submit" class="btn-search" style="margin-top: 10px;">Post Comment</button>
        </form>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            {% for comment in comments %}
            <div style="background: var(--bg-main); padding: 12px 16px; border-radius: var(--radius); border-left: 4px solid var(--accent);">
                <div style="display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px;">
                    <strong>{{ comment.user_email }}</strong>
                </div>
                <p style="font-size: 0.92rem;">{{ comment.comment_text }}</p>
            </div>
            {% endfor %}
        </div>
    </section>
</body>
</html>
