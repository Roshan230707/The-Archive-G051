<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <section class="upload-card" style="width: 100%; max-width: 400px;">
        <h2>Login</h2>
        <form action="/login" method="POST">
            <div class="form-group"><label>Email</label><input type="email" name="email" class="upload-field" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" class="upload-field" required></div>
            <button type="submit" class="btn-search" style="width:100%; margin-top:15px;">Login</button>
        </form>
        <p style="margin-top:15px; font-size:0.9rem;">New student? <a href="/register">Register here</a></p>
    </section>
</body>
</html>
